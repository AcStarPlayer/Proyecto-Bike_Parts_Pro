<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BikePartsPro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- CSS globales -->
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="../../componentes/styles.css">
  <link rel="stylesheet" href="./login.css">
</head>

<body class="d-flex flex-column min-vh-100 login-page-bikeparts">

  <!-- LOGIN / SIGN IN -->
  <section class="login-section py-5 flex-grow-1">
    <div class="container">
      
      <!-- VISTA LOGIN (visible por defecto) -->
      <div id="vista-login" class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6">
          <div class="card login-card-bikeparts p-4">
            
            <div class="text-center mb-4">
              <span class="login-tag-bikeparts">BikePartsPro</span>
              <h2 class="h3 fw-bold mt-2 mb-1">Bienvenido</h2>
              <p class="login-subinfo-bikeparts">Ingresa con tu cuenta</p>
            </div>

            <form id="formulario-login" class="d-flex flex-column gap-3">
              <div>
                <label for="email-login" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email-login" required>
              </div>
              
              <div>
                <label for="password-login" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password-login" required>
              </div>

              <div id="mensaje-login" class="d-none"></div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btn-login">
                Ingresar
              </button>

              <div class="login-extra-links">
                <a href="#" id="link-signin">¿No tienes cuenta? Regístrate</a>
                <a href="#" id="link-recuperar">¿Olvidaste tu contraseña?</a>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- VISTA SIGN IN (oculta por defecto) -->
      <div id="vista-signin" class="row justify-content-center d-none">
        <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-7">
          <div class="card login-card-bikeparts p-4">
            
            <div class="text-center mb-4">
              <span class="login-tag-bikeparts">BikePartsPro</span>
              <h2 class="h3 fw-bold mt-2 mb-1">Crear cuenta</h2>
              <p class="login-subinfo-bikeparts">Regístrate en 2 minutos</p>
            </div>

            <!-- Paso 1: Datos básicos -->
            <form id="form-datos-registro" class="d-flex flex-column gap-3">
              <div>
                <label for="nombre-registro" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre-registro" required>
              </div>

              <!-- NUEVO CAMPO: Teléfono -->
              <div>
                <label for="telefono-registro" class="form-label">Número de teléfono</label>
                <input type="tel" class="form-control" id="telefono-registro" required minlength="10" pattern="[0-9]{10,}">
                <div class="form-text text-muted small">Mínimo 10 dígitos.</div>
              </div>

            
              <div>
                <label for="email-registro" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email-registro" required>
              </div>

              <div id="mensaje-registro-paso1" class="d-none"></div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                Enviar código de verificación
              </button>

              <div class="login-extra-links">
                <a href="#" id="volver-login">Ya tengo cuenta</a>
              </div>
            </form>

            <!-- Paso 2: Código de verificación (oculto) -->
            <div id="paso-codigo-verificacion" class="d-none">
              <form id="form-codigo-verificacion" class="d-flex flex-column gap-3">
                <div class="text-center mb-3">
                  <div class="alert alert-info">
                    <i class="bi bi-envelope me-2"></i>
                    Te enviamos un código a <strong id="email-confirmado"></strong>
                    <div class="mt-2" id="contador-tiempo">120s</div>
                  </div>
                </div>

                <div>
                  <label for="codigo-verificacion" class="form-label">Código de 6 dígitos</label>
                  <input type="text" class="form-control text-center fw-bold" 
                         id="codigo-verificacion" maxlength="6" required>
                </div>

                <div>
                  <label for="password-registro" class="form-label">Contraseña</label>
                  <input type="password" class="form-control" id="password-registro" required>
                </div>

                <div>
                  <label for="confirm-password-registro" class="form-label">Confirmar contraseña</label>
                  <input type="password" class="form-control" id="confirm-password-registro" required>
                </div>

                <div id="mensaje-registro-paso2" class="d-none"></div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                  Completar registro
                </button>

                <div class="login-extra-links">
                  <a href="#" id="reenviar-codigo">Reenviar código</a>
                  <a href="#" id="volver-datos-registro">Cambiar correo</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer" class="mt-auto"></div>

  <!-- JS -->
  <script type="module" src="./login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
