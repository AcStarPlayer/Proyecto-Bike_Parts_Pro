<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contactenos | Bike Parts Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="contacto.css">
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="componentes/styles.css" />
</head>

<body>

    <nav>
  <div class="nav-content">
    </div>
    </nav>
    

  <main class="container my-5">

    <section aria-labelledby="titulo-contacto">
      <h2 id="titulo-contacto" class="text-center mb-4">Contactame</h2>

      <form 
        id="formulario"
        action="https://formspree.io/f/xwvalrrw"
        method="POST"
        class="fs-form fs-layout__2-column"
        target="_top"
      >

      <input type="hidden" name="_subject" value="Contacto - Solicitud Cliente">

        <div class="fs-field">
          <label class="fs-label" for="nombre">Nombre</label>
          <input class="fs-input" type="text" id="nombre" name="nombre" placeholder="Nombre" required>
        </div>

        <div class="fs-field">
          <label class="fs-label" for="correo">Correo</label>
          <input class="fs-input" type="email" id="correo" name="correo" placeholder="Correo" required>
        </div>

        <div class="fs-field col-span-full">
          <label class="fs-label" for="telefono">Teléfono</label>
          <input class="fs-input" type="tel" id="telefono" name="telefono" placeholder="Telefono" required>
        </div>

        <div class="fs-field col-span-full">
          <label class="fs-label" for="mensaje">Mensaje</label>
          <textarea class="fs-textarea" id="mensaje" name="mensaje" placeholder="Escribe tu mensaje" required></textarea>
        </div>

        <div class="fs-button-group">
          <button class="fs-button" type="submit">Enviar</button>
        </div>

      </form>

      <p id="error" class="text-danger mt-3"></p>

    </section>

  </main>

  <footer class="bg-dark text-white mt-5 pt-4 pb-2">
    <div class="container">
      <div class="row text-center text-md-start">

        <!-- Marca -->
        <div class="col-md-4 mb-3">
          <h5 class="fw-bold">🚴 Bike Parts Pro</h5>
          <p>Impulsamos cada pedaleada con calidad y confianza.</p>
        </div>

        <!-- Enlaces -->
        <div class="col-md-4 mb-3">
          <h5>Enlaces rápidos</h5>
          <ul class="list-unstyled">
            <li><a href="index.html" class="text-white text-decoration-none">Inicio</a></li>
            <li><a href="productos.html" class="text-white text-decoration-none">Productos</a></li>
            <li><a href="contacto.html" class="text-white text-decoration-none">Contacto</a></li>
          </ul>
        </div>

        <!-- Redes -->
        <div class="col-md-4 mb-3">
          <h5>Contáctanos</h5>
          <p>Email: bikepartspro@gmail.com</p>
          <p>
            <i class="bi bi-instagram"></i> @bikepartspro
          </p>
        </div>

      </div>

      <hr>

      <div class="text-center">
        <p class="mb-0">© 2026 Bike Parts Pro</p>
      </div>
    </div>
  </footer>

  <script type="module" src="contacto.js"></script>
</body>
</html>
