<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CONTACTO | Bike Parts Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="../Proyecto-Bike_Parts_Pro/whatsApp/whatsapp.css">
  <link rel="stylesheet" href="../Proyecto-Bike_Parts_Pro/formulario/formulario.css">
  <link rel="stylesheet" href="../Proyecto-Bike_Parts_Pro/maps/maps.css">
  <link rel="stylesheet" href="../Proyecto-Bike_Parts_Pro/footer/footer.css">

</head>

<body>

  <header class="bg-dark text-white text-center py-3">
    <h1>Contáctanos</h1>
  </header>

    <!-- MAPA -->
  <section class="container-fluid p-0">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d31673.510607528475!2d-73.1250688!3d7.1041023999999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2s!5e0!3m2!1ses-419!2sco!4v1776455606928!5m2!1ses-419!2sco"
      width="100%"
      height="400"
      style="border:0;"
      allowfullscreen=""
      loading="lazy">
    </iframe>
  </section>

      <main class="container my-5">
        <section aria-labelledby="titulo-contacto">
          <h2 id="titulo-contacto" class="text-center mb-5">Contáctame</h2>
          
          <form id="formulario" 
                action="https://formsubmit.co/bikepartsprocolombia@gmail.com" 
                method="POST"
                class="mx-auto" 
                style="max-width: 700px;"
                target="_top">

            <input type="hidden" name="_subject" value="Contacto - Solicitud Cliente">

            <div class="row g-4">
              <!-- Nombre y Correo en dos columnas -->
              <div class="col-md-6">
                <label class="form-label fw-bold">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre" required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">Correo</label>
                <input type="email" id="correo" name="correo" class="form-control" placeholder="tu@email.com" required>
              </div>

              <!-- Teléfono ocupa toda la fila -->
              <div class="col-12">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="300 123 4567" required>
              </div>

              <!-- Mensaje ocupa toda la fila -->
              <div class="col-12">
                <label class="form-label fw-bold">Mensaje</label>
                <textarea id="mensaje" name="mensaje" class="form-control" rows="6" 
                          placeholder="Escribe tu mensaje aquí..." required></textarea>
              </div>

              <!-- Botón -->
              <div class="col-12 text-center">
                <button type="submit" class="btn btn-success btn-lg px-5">Enviar Mensaje</button>
              </div>
            </div>
          </form>

          <p id="error" class="text-danger text-center mt-3"></p>
        </section>
      </main>

  <!-- BOTÓN FLOTANTE -->
  <div class="whatsapp-btn" onclick="toggleWhatsApp()">
    <i class="bi bi-whatsapp"></i>
  </div>

  <!-- CHAT BOX -->
  <div class="whatsapp-box" id="whatsappBox">
    <p>👋 Hola, ¿en qué podemos ayudarte?</p>
    <a href="https://wa.me/573000000123" target="_blank" class="btn-chat">
      Abrir chat
    </a>
  </div>

  <div id="footer"></div>

  <script src="../Proyecto-Bike_Parts_Pro/footer/footer.js"></script>
  <script src="../Proyecto-Bike_Parts_Pro/whatsApp/whatsappBox.js"></script>

</body>
</html>
